<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://play.google.com/store/apps/details?id=com.kuark7.typodatingapp&hl=tr">
    <title>Redirecting to Google Play...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Redirecting to Google Play...</h1>
        <div class="spinner"></div>
        <p>If you are not redirected automatically, <a href="https://play.google.com/store/apps/details?id=com.kuark7.typodatingapp&hl=tr">click here</a>.</p>
    </div>
    <script>
        window.location.href = "https://play.google.com/store/apps/details?id=com.kuark7.typodatingapp&hl=tr";
    </script>
</body>
</html>
