<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 135 40" width="135" height="40">
  <rect width="135" height="40" rx="6" fill="#000"/>
  <g fill="#fff" font-family="system-ui, -apple-system, sans-serif">
    <text x="30" y="15" font-size="7.5" letter-spacing="0.5">GET IT ON</text>
    <text x="30" y="30" font-size="13" font-weight="500">Google Play</text>
  </g>
  <!-- Play button icon, 18×18 units.
       Outer triangle: TL(0,0)  BL(0,18)  RT(18,9)
       Interior point: C(10,9)
       Top boundary split:    TR(13.5, 6.75)  — on line TL→RT at x=13.5
       Bottom boundary split: BR(13.5,11.25)  — on line BL→RT at x=13.5  (symmetric)
       The four shapes tile the triangle without gaps or overlaps. -->
  <g transform="translate(8, 11)">
    <path fill="#00D4FF" d="M0 0L10 9 0 18Z"/>
    <path fill="#FF3A44" d="M0 0L13.5 6.75 10 9Z"/>
    <path fill="#FFD400" d="M0 18L10 9 13.5 11.25Z"/>
    <path fill="#00F076" d="M10 9L13.5 6.75 18 9 13.5 11.25Z"/>
  </g>
</svg>
